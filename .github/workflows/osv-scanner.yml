---
# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# A sample workflow which sets up periodic OSV-Scanner scanning for vulnerabilities,
# in addition to a PR check which fails if new vulnerabilities are introduced.
#
# For more examples and options, including how to ignore specific vulnerabilities,
# see https://google.github.io/osv-scanner/github-action/

name: "OSV Scanner"

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions: {}

jobs:
  osv-scanner:
    permissions:
      # Required to upload the SARIF file to the security tab
      security-events: write
      # Required to read the code
      contents: read
      # Required to read the code
      actions: read
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2" # v2.3.8
    with:
      fail-on-vuln: false
  check:
    runs-on: ubuntu-latest
    needs: osv-scanner
    steps:
      - name: Check OSV scan results
        shell: bash
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          # The scan results JSON can be very large (potentially exceeding the
          # command-line / ARG_MAX length limit if passed as an argument or as
          # an env var expanded on the command line), so the workflow-level
          # expansion is written straight to a file via a quoted heredoc.
          # The quoted delimiter prevents any runtime shell expansion of
          # the JSON contents.
          cat > "${RUNNER_TEMP}/results.json" <<'__OSV_RESULTS_EOF__'
          ${{ needs.osv-scanner.outputs.results }}
          __OSV_RESULTS_EOF__
          # jq expression:
          # - iterate packages -> vulnerabilities -> full osv entry -> severity[] (type, score)
          # - extract numeric scores for CVSS types (cvss_v3 or numeric severity[].score)
          # - compare to threshold
          if jq '
            .results[]
            | .packages[]?
            | .vulnerabilities[]?
            | ( .severity[]?.score // "" ) as $s
            | select($s != "")
            | ($s | tonumber) >= 4.0
            ' "${RUNNER_TEMP}/results.json" | grep -q -e . ; then
            >&2 echo "error: found one or more vulnerabilities with a medium or higher severity (see step 'scan > osv-scanner > Run osv-scanner-reporter' for details)"
            exit 1
          fi
